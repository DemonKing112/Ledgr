<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Montraq</title>
  <meta name="description" content="Set a new Montraq password.">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo" style="text-decoration:none;">Mont<span>raq</span></a>
      <h1>Set a new password</h1>
      <p class="auth-subtitle">Choose a new password for your account.</p>

      <p class="auth-error" id="auth-error"></p>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Type it again" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary">Reset Password</button>
      </form>

      <p class="auth-footer">
        <a href="login.html">Back to log in</a>
      </p>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/reset-password.js"></script>

</body>
</html>
