<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Ledgr</title>
  <meta name="description" content="Reset your Ledgr password.">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo" style="text-decoration:none;">Ledg<span>r</span></a>
      <h1>Forgot your password?</h1>
      <p class="auth-subtitle">Enter your email and we'll generate a reset link.</p>

      <p class="auth-error" id="auth-error"></p>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>

      <!-- Dev-mode notice: there's no email service wired up yet,
           so the reset link is shown directly here instead of
           being emailed. In production this box would not exist. -->
      <div id="dev-token-box" style="display:none; margin-top: 20px; padding: 16px; background: var(--accent-50); border-radius: var(--radius); font-size: 0.875rem;">
        <strong>Dev mode:</strong> no email service is configured, so here's your reset link directly —
        <a id="dev-reset-link" href="#" style="color: var(--primary); font-weight: 600; word-break: break-all;"></a>
      </div>

      <p class="auth-footer">
        Remembered your password? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/forgot-password.js"></script>

</body>
</html>
