<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Ledgr</title>
  <meta name="description" content="Log in to your Ledgr account to manage your freelance expenses.">
  <link rel="icon" href="images/favicon.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- ════════════════════════════════════════════════════════
       LOGIN PAGE
       Centered card with email + password form.
       ════════════════════════════════════════════════════════ -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">Ledg<span>r</span></div>
      <h1>Welcome back</h1>
      <p class="auth-subtitle">Log in to manage your expenses</p>

      <!-- Error messages appear here -->
      <p class="auth-error" id="auth-error"></p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
          <p style="text-align: right; margin-top: 8px;"><a href="forgot-password.html" style="font-size: 0.8125rem; color: var(--text-muted);">Forgot password?</a></p>
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </p>
    </div>
  </div>

  <!-- api.js must load first — auth.js depends on the login() function -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
