<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Ledgr</title>
  <meta name="description" content="Create your free Ledgr account and start tracking expenses in minutes.">
  <link rel="icon" href="images/favicon.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- ════════════════════════════════════════════════════════
       SIGNUP PAGE
       Centered card with name, email, password, confirm fields.
       ════════════════════════════════════════════════════════ -->
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo" style="text-decoration:none;">Ledg<span>r</span></a>
      <h1>Create your account</h1>
      <p class="auth-subtitle">Free forever — no credit card required</p>

      <p class="auth-error" id="auth-error"></p>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Alex Rivera" required autocomplete="name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Type it again" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
